name: Build and publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      any: ${{ steps.check.outputs.any }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve channels and decide what to build
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Upstream floating channel tags -> our channel name
          CHANNELS="stable:server-stable preview:server-preview dev:server-dev"
          owner="${OWNER,,}"

          INCLUDE='[]'
          for pair in $CHANNELS; do
            ch="${pair%%:*}"
            tag="${pair#*:}"

            asset=$(gh release view "$tag" --repo happier-dev/happier --json assets \
              --jq '[.assets[].name | select(test("-linux-x64\\.tar\\.gz$"))][0]')
            ver=$(printf '%s' "$asset" | sed -E 's/^happier-server-v(.+)-linux-x64\.tar\.gz$/\1/')

            # On schedule, skip channels whose version image already exists.
            # On push / manual dispatch, always rebuild (Dockerfile may have changed).
            if [ "$EVENT" = "schedule" ] && \
               docker manifest inspect "$REGISTRY/$owner/happier-ui:$ver" >/dev/null 2>&1; then
              echo "skip $ch ($ver) — already published"
              continue
            fi

            echo "build $ch ($ver)"
            INCLUDE=$(printf '%s' "$INCLUDE" | jq -c \
              --arg ch "$ch" --arg tag "$tag" --arg ver "$ver" \
              '. + [{channel:$ch, upstream_tag:$tag, version:$ver}]')
          done

          echo "matrix={\"include\":$INCLUDE}" >> "$GITHUB_OUTPUT"
          if [ "$INCLUDE" = '[]' ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -eu
          case "${{ matrix.channel }}" in
            stable)  floats="latest stable" ;;
            preview) floats="preview" ;;
            dev)     floats="dev" ;;
          esac

          owner="${OWNER,,}"
          ui="" ; relay=""
          for t in $floats "${{ matrix.version }}"; do
            ui="$ui,$REGISTRY/$owner/happier-ui:$t"
            relay="$relay,$REGISTRY/$owner/happier-relay:$t"
          done
          echo "ui=${ui#,}"       >> "$GITHUB_OUTPUT"
          echo "relay=${relay#,}" >> "$GITHUB_OUTPUT"

      - name: Build and push — happier-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server-ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.ui }}
          cache-from: type=gha,scope=${{ matrix.channel }}
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}
          build-args: |
            SERVER_TAG=${{ matrix.upstream_tag }}
            SERVER_VERSION=${{ matrix.version }}

      - name: Build and push — happier-relay
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.relay }}
          cache-from: type=gha,scope=${{ matrix.channel }}
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}
          build-args: |
            SERVER_TAG=${{ matrix.upstream_tag }}
            SERVER_VERSION=${{ matrix.version }}
