name: Build and publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      any: ${{ steps.check.outputs.any }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve channels and decide what to build
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Channel -> (server tag, ui-web tag)
          CHANNELS="stable:server-stable:ui-web-stable preview:server-preview:ui-web-preview dev:server-dev:ui-web-dev"
          owner="${OWNER,,}"

          resolve_ver() { # <release-tag> <product> <suffix> -> version
            local asset
            asset=$(gh release view "$1" --repo happier-dev/happier --json assets \
              --jq "[.assets[].name | select(endswith(\"$3\"))][0]")
            asset="${asset#happier-$2-v}"   # strip prefix
            printf '%s' "${asset%$3}"       # strip suffix
          }

          INCLUDE='[]'
          for triple in $CHANNELS; do
            ch="${triple%%:*}"
            rest="${triple#*:}"
            stag="${rest%%:*}"
            utag="${rest#*:}"

            sver=$(resolve_ver "$stag" server -linux-x64.tar.gz)
            uver=$(resolve_ver "$utag" ui-web -web-any.tar.gz)

            # On schedule, skip channels whose version image already exists.
            # On push / manual dispatch, always rebuild (Dockerfile may have changed).
            if [ "$EVENT" = "schedule" ] && \
               docker manifest inspect "$REGISTRY/$owner/happier-ui:$sver" >/dev/null 2>&1; then
              echo "skip $ch ($sver) — already published"
              continue
            fi

            echo "build $ch (server=$sver ui-web=$uver)"
            INCLUDE=$(printf '%s' "$INCLUDE" | jq -c \
              --arg ch "$ch" --arg stag "$stag" --arg sver "$sver" \
              --arg utag "$utag" --arg uver "$uver" \
              '. + [{channel:$ch, upstream_tag:$stag, version:$sver, ui_web_tag:$utag, ui_web_version:$uver}]')
          done

          echo "matrix={\"include\":$INCLUDE}" >> "$GITHUB_OUTPUT"
          if [ "$INCLUDE" = '[]' ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -eu
          case "${{ matrix.channel }}" in
            stable)  floats="latest stable" ;;
            preview) floats="preview" ;;
            dev)     floats="dev" ;;
          esac

          owner="${OWNER,,}"
          ui="" ; relay=""
          for t in $floats "${{ matrix.version }}"; do
            ui="$ui,$REGISTRY/$owner/happier-ui:$t"
            relay="$relay,$REGISTRY/$owner/happier-relay:$t"
          done
          echo "ui=${ui#,}"       >> "$GITHUB_OUTPUT"
          echo "relay=${relay#,}" >> "$GITHUB_OUTPUT"

      # Gate: build a local amd64 image and confirm a fresh DB gets a schema.
      # If a channel's binary neither self-migrates nor is bootstrapped by our
      # entrypoint, this fails the channel and nothing is published for it.
      - name: Build test image (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64
          load: true
          tags: happier-test:${{ matrix.channel }}
          cache-from: type=gha,scope=${{ matrix.channel }}
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}
          build-args: |
            SERVER_TAG=${{ matrix.upstream_tag }}
            SERVER_VERSION=${{ matrix.version }}
            UI_WEB_TAG=${{ matrix.ui_web_tag }}
            UI_WEB_VERSION=${{ matrix.ui_web_version }}

      - name: Smoke test — schema is created on a fresh database
        run: |
          set -eu
          data=$(mktemp -d)
          docker run -d --name st -e HANDY_MASTER_SECRET=test -v "$data":/data \
            happier-test:${{ matrix.channel }} >/dev/null
          sleep 10
          tables=$(docker run --rm -v "$data":/data alpine sh -c \
            'apk add -q sqlite 2>/dev/null; sqlite3 /data/happier-server-light.sqlite ".tables" 2>/dev/null | tr " " "\n" | grep -c .' || echo 0)
          echo "tables created: ${tables}"
          docker logs st 2>&1 | grep -iE '\[entrypoint\]|does not exist' | head -5 || true
          docker rm -f st >/dev/null 2>&1 || true
          rm -rf "$data"
          if [ "${tables:-0}" -lt 10 ]; then
            echo "::error::channel ${{ matrix.channel }} produced no schema (${tables} tables) — not publishing"
            exit 1
          fi

      - name: Build and push — happier-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server-ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.ui }}
          cache-from: type=gha,scope=${{ matrix.channel }}
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}
          build-args: |
            SERVER_TAG=${{ matrix.upstream_tag }}
            SERVER_VERSION=${{ matrix.version }}
            UI_WEB_TAG=${{ matrix.ui_web_tag }}
            UI_WEB_VERSION=${{ matrix.ui_web_version }}

      - name: Build and push — happier-relay
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.relay }}
          cache-from: type=gha,scope=${{ matrix.channel }}
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}
          build-args: |
            SERVER_TAG=${{ matrix.upstream_tag }}
            SERVER_VERSION=${{ matrix.version }}
            UI_WEB_TAG=${{ matrix.ui_web_tag }}
            UI_WEB_VERSION=${{ matrix.ui_web_version }}
