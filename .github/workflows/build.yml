name: Build and publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      server_tag: ${{ steps.check.outputs.server_tag }}
      server_version: ${{ steps.check.outputs.server_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SERVER_TAG=$(gh release list --repo happier-dev/happier --limit 50 \
            | awk -F'\t' '/^Happier Server / { print $3; exit }')

          CURRENT=$(cat .version 2>/dev/null || echo "")

          echo "server_tag=$SERVER_TAG"                 >> "$GITHUB_OUTPUT"
          echo "server_version=${SERVER_TAG#server-v}" >> "$GITHUB_OUTPUT"

          echo "Current: $CURRENT"
          echo "Latest:  $SERVER_TAG"

          if [ "$SERVER_TAG" != "$CURRENT" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-ui
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/happier-ui
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.detect.outputs.server_version }}

      - uses: docker/metadata-action@v5
        id: meta-relay
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/happier-relay
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.detect.outputs.server_version }}

      - name: Build and push — with UI
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server-ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVER_TAG=${{ needs.detect.outputs.server_tag }}
            SERVER_VERSION=${{ needs.detect.outputs.server_version }}

      - name: Build and push — relay
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-relay.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVER_TAG=${{ needs.detect.outputs.server_tag }}
            SERVER_VERSION=${{ needs.detect.outputs.server_version }}

      - name: Commit updated .version
        if: github.event_name != 'push'
        run: |
          echo "${{ needs.detect.outputs.server_tag }}" > .version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .version
          git commit -m "chore: update to ${{ needs.detect.outputs.server_version }}"
          git push
